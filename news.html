<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media | Янгиликлар</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .post-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .post-card img { width: 100% !important; height: auto !important; border-radius: 15px; margin: 15px 0; }
        .post-content { line-height: 1.8; color: #cbd5e1; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6" id="news-feed">
        <h1 class="text-4xl font-bold mb-10 text-sky-400">Сўнгги янгиликлар</h1>
        <div id="status-message" class="text-center py-20 text-xl">Маълумотлар базаси текширилмоқда...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ДИҚҚАТ: databaseURL нинг охирида / белгиси бўлмасин
        const firebaseConfig = {
            databaseURL: "https://bumuzbekistan-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const newsFeed = document.getElementById('news-feed');
        const statusMsg = document.getElementById('status-message');

        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                statusMsg.style.display = 'none';
                // Эски мақолаларни тозалаб, янгисини чиқариш
                const keys = Object.keys(data).reverse();
                keys.forEach(key => {
                    const post = data[key];
                    const articleHtml = `
                        <div class="post-card">
                            <h2 class="text-2xl font-bold mb-3 text-white">${post.title}</h2>
                            <div class="text-sm text-gray-500 mb-4">📅 ${post.date || '03.05.2026'}</div>
                            <div class="post-content">${post.body}</div>
                        </div>
                    `;
                    newsFeed.innerHTML += articleHtml;
                });
            } else {
                statusMsg.innerText = "Ҳозирча ҳеч қандай мақола топилмади.";
            }
        }, (error) => {
            statusMsg.innerText = "Хатолик: База билан алоқа йўқ.";
            console.error(error);
        });
    </script>
</body>
</html>
