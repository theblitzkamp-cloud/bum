<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXFIY PLATFORMA | CIA & MI6 STYLE</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .agent-card { border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }
        .hidden { display: none; }
        input, textarea, select { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 100%; outline: none; }
        input:focus { box-shadow: 0 0 10px #00ff41; }
        button { border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; }
        .sidebar { border-right: 1px solid #1a3a1a; }
        .status-online { color: #00ff41; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<!-- 1. KIRISH EKRANI -->
<div id="login-screen" class="flex h-screen items-center justify-center">
    <div class="agent-card p-10 rounded-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center tracking-[5px] text-red-600">IDENTIFICATION REQUIRED</h1>
        <div class="space-y-4">
            <div>
                <label class="text-xs">LOG-IN / AGENT ID</label>
                <input type="text" id="login-id" placeholder="Masalan: boss yoki 901234567">
            </div>
            <div>
                <label class="text-xs">ACCESS CODE</label>
                <input type="password" id="login-pass" placeholder="******">
            </div>
            <button onclick="login()" class="w-full mt-4">VERIFY IDENTITY</button>
        </div>
    </div>
</div>

<!-- 2. ASOSIY PANEL -->
<div id="main-dashboard" class="hidden flex h-screen">
    
    <!-- Sidebar -->
    <div class="sidebar w-72 p-6 flex flex-col">
        <div class="mb-10 text-center">
            <div class="text-2xl font-bold border-b border-green-500 pb-2">STRATEGIC CENTER</div>
            <p id="user-display" class="text-[10px] mt-2 text-yellow-500 italic"></p>
        </div>
        
        <nav class="space-y-2 flex-1">
            <button onclick="showSection('news')" class="w-full text-left text-sm">📁 YANGILIKLAR & MAQOLA</button>
            <button onclick="showSection('legal')" class="w-full text-left text-sm">⚖️ QONUNIY HUJJATLAR</button>
            <button id="nav-admin" onclick="showSection('admin')" class="w-full text-left text-sm hidden text-red-400">⚡ ADMIN: AGENT QO'SHISH</button>
            <button id="nav-reports" onclick="showSection('reports')" class="w-full text-left text-sm hidden text-yellow-400">📊 MAXFIY HISOBOTLAR</button>
            <button onclick="showSection('video')" class="w-full text-left text-sm">📡 VIDEO KONFERENSIYA</button>
        </nav>

        <div class="pt-6 border-t border-green-900 space-y-2">
            <button onclick="window.location.href='index.html'" class="w-full text-xs border-blue-500 text-blue-500">ASOSIY SAHIFA</button>
            <button onclick="location.reload()" class="w-full text-xs border-red-500 text-red-500">LOGOUT (EXIT)</button>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-1 p-8 overflow-y-auto">
        
        <!-- Yangiliklar & Maqola -->
        <section id="sec-news" class="content-sec">
            <h2 class="text-xl mb-4 underline">MAQOLA VA SHE'RLAR YUBORISH</h2>
            <div class="agent-card p-6 space-y-4">
                <input type="text" id="post-title" placeholder="Sarlavha...">
                <textarea id="post-body" rows="6" placeholder="Maqola, yangilik yoki she'rni shu yerga yozing..."></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="file" id="post-file" class="text-xs">
                    <input type="text" id="post-yt" placeholder="YouTube Embed Code (iFrame)">
                </div>
                <button onclick="uploadPost()">TIZIMGA YUKLASH (AUTO-TRANSLATE)</button>
            </div>
        </section>

        <!-- Admin: Agent Qo'shish -->
        <section id="sec-admin" class="content-sec hidden">
            <h2 class="text-xl mb-4 text-red-500">AGENTLARNI BOSHQARISH</h2>
            <div class="agent-card p-6 space-y-4">
                <p class="text-xs italic">Yangi faollarni tizimga qo'shish:</p>
                <input type="text" id="new-agent-tel" placeholder="Telefon raqami (masalan: 991234567)">
                <input type="text" id="new-agent-name" placeholder="Ism-sharifi">
                <button onclick="addNewAgent()">AGЕNTNI TASDIQLASH</button>
            </div>
            <div id="agent-list" class="mt-6 space-y-2">
                <!-- Agentlar ro'yxati shu yerga chiqadi -->
            </div>
        </section>

        <!-- Video Konferensiya -->
        <section id="sec-video" class="content-sec hidden text-center">
            <h2 class="text-xl mb-4">SECURE VIDEO LINE <span class="status-online">● LIVE</span></h2>
            <div class="grid grid-cols-4 gap-4">
                <div class="col-span-3 agent-card h-[500px] bg-black relative">
                    <video id="myCam" autoplay playsinline class="w-full h-full object-cover"></video>
                    <div id="rec-indicator" class="absolute top-5 right-5 text-red-600 font-bold hidden animate-pulse">REC ●</div>
                </div>
                <div class="agent-card p-4 text-left">
                    <h3 class="text-xs border-b border-green-800 mb-2">ONLINE AGENTLAR</h3>
                    <div id="online-users" class="text-[10px] space-y-2">
                        <!-- Geolokatsiya va ID shu yerda -->
                    </div>
                </div>
            </div>
            <div class="mt-4 flex justify-center space-x-4">
                <button onclick="startCam()" class="bg-green-900">KAMERANI YOQISH</button>
                <button onclick="toggleRecording()" id="rec-btn" class="bg-red-900">YOZISHNI BOSHLASH</button>
            </div>
        </section>

        <!-- Hisobotlar -->
        <section id="sec-reports" class="content-sec hidden">
            <h2 class="text-xl mb-4">RAHBARIYAT UCHUN HISOBOTLAR</h2>
            <div id="reports-box" class="space-y-4">
                <!-- Faollar yuborgan hisobotlar -->
            </div>
        </section>

    </div>
</div>

<script>
    // 1. Firebase Integratsiyasi
    const firebaseConfig = {
        apiKey: "AIzaSyBnDKaFZClF1SS9al1pEyG5iUWCgnRcvBI",
        authDomain: "bumuzbekistan.firebaseapp.com",
        databaseURL: "https://bumuzbekistan-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bumuzbekistan",
        storageBucket: "bumuzbekistan.firebasestorage.app",
        messagingSenderId: "197153596410",
        appId: "1:197153596410:web:db18dca78e911a213e3a43"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let isRecording = false;

    // 2. Login Funksiyasi
    function login() {
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-pass').value;

        if (id === 'boss' && pass === '1965') {
            enter('BOSS', 'RAHBAR');
        } else if (id === 'admin' && pass === '123') {
            enter('ADMIN', 'ADMINISTRATOR');
        } else if (id.length >= 7 && pass === '2026') {
            enter('USER', id);
        } else {
            alert("ACCESS DENIED! LOGIN YOKI PAROL XATO.");
        }
    }

    function enter(role, name) {
        currentUser = { role, name };
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('user-display').innerText = `AGENT: ${name} | ROLE: ${role}`;

        if(role === 'ADMIN' || role === 'BOSS') {
            document.getElementById('nav-admin').classList.remove('hidden');
            document.getElementById('nav-reports').classList.remove('hidden');
        }
    }

    // 3. Navigatsiya
    function showSection(id) {
        document.querySelectorAll('.content-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
    }

    // 4. Maqola yuklash (Firebase)
    function uploadPost() {
        const title = document.getElementById('post-title').value;
        const text = document.getElementById('post-body').value;
        if(!title || !text) return alert("Ma'lumot to'liq emas!");

        db.ref('posts').push({
            title: title,
            content: text,
            author: currentUser.name,
            timestamp: Date.now(),
            translations: {
                en: "Auto-translating...",
                tr: "Otomatik çeviri...",
                ru: "Авто-перевод..."
            }
        });
        alert("Ma'lumot qabul qilindi. 4 tilda chop etiladi.");
    }

    // 5. Admin: Agent qo'shish
    function addNewAgent() {
        const tel = document.getElementById('new-agent-tel').value;
        const name = document.getElementById('new-agent-name').value;
        if(!tel || !name) return alert("Ma'lumotni kiriting!");

        db.ref('agents/' + tel).set({
            name: name,
            addedBy: currentUser.name,
            status: 'Authorized'
        });
        alert(name + " tizimga qo'shildi. Login: " + tel + " Parol: 2026");
    }

    // 6. Video va Kamera
    async function startCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('myCam').srcObject = stream;
            
            // Geolokatsiyani online ro'yxatga chiqarish
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = `${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`;
                db.ref('online_agents/' + currentUser.name).set({
                    location: loc,
                    time: new Date().toLocaleTimeString()
                });
            });
        } catch (e) {
            alert("Kameraga ruxsat berilmadi!");
        }
    }

    function toggleRecording() {
        const btn = document.getElementById('rec-btn');
        const ind = document.getElementById('rec-indicator');
        isRecording = !isRecording;
        
        if(isRecording) {
            btn.innerText = "YOZISHNI TO'XTATISH";
            btn.style.background = "#440000";
            ind.classList.remove('hidden');
        } else {
            btn.innerText = "YOZISHNI BOSHLASH";
            btn.style.background = "#7f1d1d";
            ind.classList.add('hidden');
            alert("Video saqlandi va Admin/Rahbariyatga yuborildi.");
        }
    }

</script>
</body>
</html>
