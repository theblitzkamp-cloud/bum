<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUM HQ | Secure System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020408; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; margin: 0; }
        
        /* Логин ойнаси учун стиллар */
        #login-overlay { background: radial-gradient(circle, #0d1117 0%, #020408 100%); z-index: 9999; }
        .auth-card { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.9); position: relative; }
        .auth-input { background: #000 !important; border: 1px solid #30363d !important; color: #58a6ff !important; text-align: center; }
        
        /* Кабинет стиллари */
        .agency-card { background: rgba(13, 17, 23, 0.9); border: 1px solid #1f2937; border-left: 4px solid #2563eb; }
        #map { height: 250px; width: 100%; border-radius: 8px; filter: invert(100%) hue-rotate(180deg) brightness(0.6); }
        .active-user-card { background: rgba(255,255,255,0.05); border: 1px solid #1f2937; transition: 0.3s; }
        .hidden { display: none !important; }
        
        .home-link { color: #fbbf24; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .home-link:hover { color: #f59e0b; text-decoration: underline; }
    </style>
</head>
<body class="h-screen flex">

    <!-- 1. ЛОГИН ОЙНАСИ (КИРИШДАН АВВАЛ КЎРИНАДИ) -->
    <div id="login-overlay" class="fixed inset-0 flex items-center justify-center">
        <div class="auth-card p-10 w-full max-w-sm text-center">
            <div class="mb-8">
                <i class="fas fa-user-shield text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-2xl font-black text-white italic uppercase tracking-tighter">BUM SYSTEM</h2>
                <p class="text-[9px] text-gray-500 uppercase tracking-[3px] mt-2">Кириш учун идентификация керак</p>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="sys_user" class="auth-input w-full p-4 rounded-xl outline-none" placeholder="Логин">
                <input type="password" id="sys_pass" class="auth-input w-full p-4 rounded-xl outline-none" placeholder="Пароль">
                <button onclick="checkAuth()" class="w-full bg-blue-600 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest hover:bg-blue-500 transition-all">Тизимга кириш</button>
            </div>
            
            <div id="auth-error" class="text-red-500 text-[10px] font-bold mt-4 hidden uppercase">Кириш рад этилди!</div>

            <!-- Асосий саҳифага қайтиш линки -->
            <div class="mt-8 border-t border-gray-800 pt-6">
                <a href="index.html" class="home-link font-bold">
                    <i class="fas fa-arrow-left mr-2"></i> Асосий саҳифага қайтиш
                </a>
            </div>
        </div>
    </div>

    <!-- 2. АСОСИЙ КАБИНЕТ (АВВАЛ ЯШИРИН БЎЛАДИ) -->
    <div id="main-content" class="h-screen w-full flex hidden">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-[#080a0f] border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-microchip text-2xl text-blue-500"></i>
                    <span class="font-black text-xl text-white">BUM HQ</span>
                </div>
            </div>
            <nav class="flex-1 p-4">
                <div class="p-4 bg-blue-900/10 rounded-xl border border-blue-900/20">
                    <p class="text-[10px] text-blue-500 font-bold uppercase">Актив Сардор</p>
                    <p class="text-white font-bold text-sm">В. Качанов</p>
                </div>
            </nav>
            <div class="p-6">
                <button onclick="location.reload()" class="w-full p-3 bg-red-900/10 text-red-500 rounded border border-red-900/30 text-xs font-bold uppercase">Тизимдан чиқиш</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col">
            <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-[#0d1117]">
                <div class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Secure Line: Active // ID Auto-Gen Enabled</div>
                <div id="clock" class="text-blue-500 font-bold"></div>
            </header>

            <div class="flex-1 overflow-hidden p-8">
                <div class="grid grid-cols-12 gap-6 h-full">
                    <!-- Видео чат -->
                    <div class="col-span-8 flex flex-col space-y-4">
                        <div class="flex-1 bg-black rounded-xl border border-gray-800 relative flex items-center justify-center">
                            <i class="fas fa-video-slash text-gray-800 text-6xl"></i>
                            <div class="absolute top-4 left-4 text-[10px] text-green-500 bg-black/50 p-1 px-2 border border-green-500/30">CAM_ACTIVE_ID_755</div>
                        </div>
                        <button onclick="openModal()" class="bg-blue-600 text-black py-4 rounded-xl font-black text-xs uppercase tracking-widest">Янги фаол қўшиш</button>
                    </div>

                    <!-- Харита ва Рўйхат -->
                    <div class="col-span-4 flex flex-col space-y-4 overflow-hidden">
                        <div class="agency-card p-2"><div id="map"></div></div>
                        <div class="agency-card p-4 flex-1 overflow-y-auto">
                            <h4 class="text-[10px] text-gray-500 uppercase mb-4 font-bold">Фаоллар рўйхати</h4>
                            <div id="members-list" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- МОДАЛ -->
    <div id="add-modal" class="fixed inset-0 bg-black/90 z-[10000] flex items-center justify-center hidden text-white">
        <div class="agency-card w-full max-w-sm p-8">
            <h3 class="font-black mb-6 uppercase italic">Объектни қайд этиш</h3>
            <div class="space-y-4">
                <input type="text" id="m-name" class="w-full p-4 bg-black border border-gray-800 rounded-lg text-sm outline-none" placeholder="Исм">
                <input type="text" id="m-phone" class="w-full p-4 bg-black border border-gray-800 rounded-lg text-sm outline-none" placeholder="Телефон">
                <div class="flex space-x-2 pt-4">
                    <button onclick="saveMember()" class="flex-1 bg-blue-600 text-black font-black py-4 rounded-xl text-xs uppercase">Сақлаш</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-900 text-white font-bold py-4 rounded-xl text-xs uppercase">Ёпиш</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // АУТЕНТИФИКАЦИЯ
        function checkAuth() {
            const user = document.getElementById('sys_user').value.trim();
            const pass = document.getElementById('sys_pass').value.trim();
            const error = document.getElementById('auth-error');

            if (user === "bum" && pass === "2026") {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initMap();
            } else {
                error.classList.remove('hidden');
                document.getElementById('sys_user').value = "";
                document.getElementById('sys_pass').value = "";
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('login-overlay').classList.contains('hidden')) {
                checkAuth();
            }
        });

        // КАБИНЕТ ФУНКЦИЯЛАРИ
        let members = [];
        let map;

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([41.0001, 71.6726], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
        }

        function openModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('add-modal').classList.add('hidden'); }

        function saveMember() {
            const name = document.getElementById('m-name').value;
            const phone = document.getElementById('m-phone').value;
            if (name && phone) {
                const id = Math.floor(1000 + Math.random() * 9000);
                const lat = 40.98 + (Math.random() * 0.04);
                const lng = 71.58 + (Math.random() * 0.15);
                members.push({ name, phone, id, lat, lng });
                updateUI();
                closeModal();
                document.getElementById('m-name').value = '';
                document.getElementById('m-phone').value = '';
            }
        }

        function updateUI() {
            const list = document.getElementById('members-list');
            list.innerHTML = '';
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });
            members.forEach((m, index) => {
                list.innerHTML += `
                    <div class="active-user-card p-3 rounded-xl flex items-center justify-between">
                        <div class="text-[10px]">
                            <p class="font-black text-blue-500 uppercase">${m.name}</p>
                            <p class="text-gray-500 text-[9px]">${m.phone} | ID-${m.id}</p>
                        </div>
                        <button onclick="removeMember(${index})" class="text-red-900 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`;
                L.marker([m.lat, m.lng]).addTo(map).bindPopup(m.name);
            });
        }

        function removeMember(index) {
            if(confirm('Ўчирилсинми?')) { members.splice(index, 1); updateUI(); }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
