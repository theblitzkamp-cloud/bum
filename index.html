<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БУМ | Бирлашган Ўзбек Мухолифати</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .header-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        /* МАҚОЛАЛАР БЛОКИ (БЛОГ УСЛУБИ) */
        .post-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 40px;
            height: auto !important; /* Тўлиқ чиқишини таъминлайди */
        }

        .post-title {
            font-size: 2rem;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        /* РАСМЛАРНИ АВТОМАТИК ТЎҒРИЛАШ */
        .post-content img {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            border-radius: 16px;
            margin: 20px 0;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .post-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cbd5e1;
            word-wrap: break-word;
        }

        .nav-link:hover {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header-gradient p-6 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">БУМ</h1>
                <p class="text-[10px] uppercase tracking-widest text-sky-400">Бирлашган Ўзбек Мухолифати</p>
            </div>
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="#" class="nav-link transition">Ҳаммаси</a>
                <a href="news.html" class="nav-link transition">Янгиликлар</a>
                <a href="#" class="nav-link transition">Мақолалар</a>
                <a href="#" class="nav-link transition">Қонунчилик</a>
            </nav>
            <a href="dashboard.html" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded-full text-sm font-bold transition">
                КАБИНЕТ
            </a>
        </div>
    </header>

    <!-- Банер -->
    <section class="py-20 text-center">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-4">Билим ва Маълумотлар Маркази</h2>
        <p class="text-gray-400 max-w-2xl mx-auto">Энг сўнгги янгиликлар, таҳлилий мақолалар ва ҳуқуқий ҳужжатлар порталига хуш келибсиз.</p>
    </section>

    <!-- Мақолалар лентаси -->
    <main class="max-w-4xl mx-auto px-6 pb-20">
        <div id="news-container">
            <div class="text-center py-10">Маълумотлар юкланмоқда...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ЕВРОПА СЕРВЕРИ УЧУН ТЎҒРИЛАНГАН КОНФИГУРАЦИЯ
        const firebaseConfig = {
            databaseURL: "https://bumuzbekistan-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('news-container');

        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                container.innerHTML = '';
                const keys = Object.keys(data).reverse();
                
                keys.forEach(key => {
                    const post = data[key];
                    container.innerHTML += `
                        <article class="post-card">
                            <div class="flex items-center space-x-3 text-xs text-sky-400 mb-4 uppercase font-bold tracking-widest">
                                <span>Янгилик</span>
                                <span class="text-gray-600">|</span>
                                <span class="text-gray-400">${post.date || '03.05.2026'}</span>
                            </div>
                            <h2 class="post-title">${post.title}</h2>
                            <div class="post-content">
                                ${post.body}
                            </div>
                        </article>
                    `;
                });
            } else {
                container.innerHTML = '<p class="text-center text-gray-500">Ҳозирча мақолалар мавжуд эмас.</p>';
            }
        });
    </script>
</body>
</html>
