<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUM HQ | Auto-ID System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020408; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .agency-card { background: rgba(13, 17, 23, 0.9); border: 1px solid #1f2937; border-left: 4px solid #2563eb; }
        .modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        #map { height: 250px; width: 100%; border-radius: 8px; filter: invert(100%) hue-rotate(180deg) brightness(0.6); }
        .active-user-card { border-bottom: 1px solid #1f2937; padding: 12px; }
        input { background: #000; border: 1px solid #30363d; color: #00ff41; outline: none; }
        input:focus { border-color: #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-[#080a0f] border-r border-gray-800 flex flex-col">
        <div class="p-6 border-b border-gray-800">
            <div class="flex items-center space-x-3">
                <i class="fas fa-microchip text-2xl text-blue-500"></i>
                <span class="font-black text-xl">BUM HQ</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('videochat')" class="w-full flex items-center space-x-3 p-3 bg-blue-900/20 rounded-lg">
                <i class="fas fa-video text-green-500"></i> <span>Видеочат & Фаоллар</span>
            </button>
        </nav>
        <div class="p-6">
            <button onclick="location.href='login.html'" class="w-full p-2 bg-red-900/20 text-red-500 rounded border border-red-900/50 text-xs font-bold uppercase">Чиқиш</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col">
        <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-[#0d1117]">
            <div class="text-[10px] font-bold uppercase text-gray-600 tracking-widest">Secure Line: Active // ID Auto-Gen Enabled</div>
            <div id="clock" class="text-blue-500 font-bold"></div>
        </header>

        <div class="flex-1 overflow-hidden p-8">
            <div class="grid grid-cols-12 gap-6 h-full">
                <!-- Видео -->
                <div class="col-span-8 space-y-4">
                    <div class="aspect-video bg-black rounded-xl border border-gray-800 relative">
                        <div class="absolute inset-0 flex items-center justify-center opacity-10">
                            <i class="fas fa-user-shield text-9xl"></i>
                        </div>
                    </div>
                    <div class="flex space-x-4">
                        <button onclick="openAddModal()" class="bg-blue-600 text-black px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition-all">
                            <i class="fas fa-user-plus mr-2"></i> Фаол қўшиш
                        </button>
                    </div>
                </div>

                <!-- Фаоллар ва Харита -->
                <div class="col-span-4 flex flex-col space-y-6 overflow-hidden">
                    <div class="agency-card p-4">
                        <div id="map"></div>
                    </div>
                    <div class="agency-card p-4 flex-1 overflow-y-auto">
                        <h4 class="text-[10px] text-gray-500 uppercase mb-4 font-bold">Фаоллар рўйхати</h4>
                        <div id="members-list" class="space-y-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- МОДАЛ ОЙНАСИ (Фақат Исм ва Телефон) -->
    <div id="add-modal" class="fixed inset-0 modal z-50 flex items-center justify-center hidden">
        <div class="agency-card w-full max-w-sm p-8 border-t-8 border-t-blue-600">
            <h3 class="text-lg font-black mb-6 text-white uppercase italic">Янги фаол қўшиш</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold">Фаолнинг исми</label>
                    <input type="text" id="m-name" class="w-full p-3 rounded mt-1 text-sm" placeholder="Масалан: Алиев Вали">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold">Телефон рақами</label>
                    <input type="text" id="m-phone" class="w-full p-3 rounded mt-1 text-sm" placeholder="+998 XX XXX XX XX">
                </div>
                <div class="flex space-x-3 pt-4">
                    <button onclick="saveMember()" class="flex-1 bg-blue-600 text-black font-black py-3 rounded uppercase text-[10px]">Қўшиш</button>
                    <button onclick="closeAddModal()" class="flex-1 bg-gray-900 text-white font-bold py-3 rounded uppercase text-[10px]">Бекор қилиш</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let members = [];
        let map;

        // Харитани юклаш (Наманган маркази)
        function initMap() {
            if (!map) {
                map = L.map('map').setView([41.0001, 71.6726], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
        }

        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        function saveMember() {
            const name = document.getElementById('m-name').value;
            const phone = document.getElementById('m-phone').value;

            if (name && phone) {
                // АВТОМАТИК ID ЯРАТИШ (Масалан: 7559 каби)
                const autoID = Math.floor(1000 + Math.random() * 9000);
                
                // АВТОМАТИК ГЕОЛОКАЦИЯ (Наманган маркази атрофида тасодифий нуқта)
                const autoLat = 40.98 + (Math.random() * 0.04);
                const autoLng = 71.58 + (Math.random() * 0.15);

                members.push({ name, phone, id: autoID, lat: autoLat, lng: autoLng });
                
                renderMembers();
                closeAddModal();

                // Майдонларни тозалаш
                document.getElementById('m-name').value = '';
                document.getElementById('m-phone').value = '';
            } else {
                alert("Илтимос, исм ва телефонни тўлдиринг!");
            }
        }

        function renderMembers() {
            const list = document.getElementById('members-list');
            list.innerHTML = '';
            
            // Маркерларни тозалаш
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });

            members.forEach((m, index) => {
                list.innerHTML += `
                    <div class="active-user-card flex items-center justify-between bg-white/5 rounded-lg mb-2">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-600 text-black rounded flex items-center justify-center font-bold text-xs">
                                ID-${m.id}
                            </div>
                            <div class="text-[10px]">
                                <p class="font-black text-blue-400 uppercase">${m.name}</p>
                                <p class="text-gray-500">${m.phone}</p>
                            </div>
                        </div>
                        <button onclick="removeMember(${index})" class="text-red-900 hover:text-red-500 p-2">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;

                L.marker([m.lat, m.lng]).addTo(map).bindPopup(`<b>${m.name}</b><br>ID: ${m.id}`);
            });
        }

        function removeMember(index) {
            if(confirm('Фаолни тизимдан ўчирамизми?')) {
                members.splice(index, 1);
                renderMembers();
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = initMap;
    </script>
</body>
</html>
