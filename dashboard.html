<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИНТЕЛЛЕКТУАЛ ТИЗИМ | МАХФИЙ БОШҚАРУВ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        :root { --spy-blue: #00cfec; --spy-dark: #050a10; }
        body { background-color: var(--spy-dark); color: #c1c7cd; font-family: 'Space Mono', monospace; overflow-x: hidden; }
        .glass-panel { background: rgba(10, 20, 30, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 207, 236, 0.2); }
        .hidden { display: none !important; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- 1. АСОСИЙ САҲИФА -->
    <div id="site-main">
        <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-cyan-600 rounded flex items-center justify-center font-bold text-black">U</div>
                <span class="text-xl font-bold tracking-tighter text-white uppercase">БИРЛАШГАН ЎЗБЕК МУХОЛИФАТИ</span>
            </div>
            <button onclick="openLogin()" class="bg-cyan-600 text-black px-4 py-1 rounded hover:bg-cyan-400 transition text-[11px] font-bold uppercase">Шахсий кабинет</button>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="border-l-4 border-cyan-500 p-6 glass-panel mb-8">
                <h1 class="text-2xl font-bold text-white mb-4 italic">Сўнгги маълумотлар</h1>
                <p class="text-gray-400">Тизим янгиланмоқда... Ҳисоботлар шахсий кабинетда нашр этилади.</p>
            </div>
        </main>
    </div>

    <!-- 2. КИРИШ ОЙНАСИ -->
    <div id="login-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[100]">
        <div class="glass-panel p-8 w-full max-w-md border-t-4 border-cyan-500 shadow-2xl">
            <h2 class="text-center text-white font-bold mb-8 tracking-[4px] uppercase italic">Тизимга кириш</h2>
            <div class="space-y-4">
                <select id="user-role" class="w-full bg-black border border-gray-800 p-4 text-xs text-cyan-500 outline-none" onchange="updateLoginFields()">
                    <option value="active">ФАОЛ (Телефон орқали)</option>
                    <option value="boss">РАҲБАР (BOSS)</option>
                </select>

                <!-- Телефон киритиш (Фаоллар учун) -->
                <div id="phone-container">
                    <input type="text" id="user-phone" class="w-full bg-black border border-gray-800 p-4 text-xs text-white outline-none focus:border-cyan-500" placeholder="Телефон рақамингиз (901234567)">
                </div>

                <!-- Пароль киритиш (Раҳбар учун) -->
                <div id="pass-container" class="hidden">
                    <input type="password" id="user-pass" class="w-full bg-black border border-gray-800 p-4 text-xs text-white outline-none focus:border-cyan-500" placeholder="Махфий код">
                </div>

                <button onclick="handleLoginAttempt()" class="w-full bg-cyan-600 text-black font-bold py-4 text-xs uppercase hover:bg-cyan-400 transition">Шифрни очиш</button>
                <button onclick="closeLogin()" class="w-full text-gray-600 text-[10px] uppercase mt-2">Бекор қилиш</button>
            </div>
        </div>
    </div>

    <!-- 3. ШАХСИЙ КАБИНЕТ (DASHBOARD) -->
    <div id="dashboard" class="fixed inset-0 bg-[#020508] z-[200] hidden flex">
        <!-- Sidebar -->
        <div class="w-64 border-r border-gray-900 p-6 flex flex-col justify-between bg-[#050a10]">
            <div class="space-y-10">
                <div class="text-cyan-500 font-bold italic tracking-widest text-sm">AGENT_CORE v4.0</div>
                <nav class="space-y-6 text-[10px] font-bold uppercase tracking-widest">
                    <button onclick="switchTab('video')" class="block w-full text-left hover:text-cyan-400"><i class="fas fa-video mr-3"></i> Видео алоқа</button>
                    <button onclick="switchTab('post')" class="block w-full text-left hover:text-cyan-400"><i class="fas fa-pen-nib mr-3"></i> Ҳисобот ёзиш</button>
                </nav>
            </div>
            <button onclick="location.reload()" class="text-red-600 text-[10px] font-bold uppercase border-t border-gray-900 pt-4"><i class="fas fa-power-off mr-2"></i> Тизимдан чиқиш</button>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 p-10 overflow-y-auto">
            <header class="flex justify-between items-center border-b border-gray-900 pb-6 mb-10">
                <div id="display-user" class="text-xs font-bold text-cyan-500 uppercase tracking-widest border-l-2 border-cyan-500 pl-4"></div>
                <div id="clock" class="text-[10px] text-gray-600 font-bold"></div>
            </header>

            <!-- Video Tab -->
            <div id="tab-video" class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="relative aspect-video rounded-lg overflow-hidden border border-gray-800 bg-black" id="video-wrapper">
                        <div id="cam-status" class="absolute inset-0 flex items-center justify-center text-gray-700 text-[10px] uppercase font-bold">Камера кутилмоқда...</div>
                    </div>
                    <div class="mt-6 flex space-x-4">
                        <button onclick="startCamera()" class="bg-cyan-700 text-black px-8 py-3 text-[10px] font-bold uppercase">Камерани ёқиш</button>
                        <button onclick="alert('Ёзиш бошланди...')" class="bg-gray-800 text-white px-8 py-3 text-[10px] font-bold uppercase">REC ●</button>
                    </div>
                </div>
            </div>

            <!-- Post Tab -->
            <div id="tab-post" class="hidden max-w-2xl space-y-6">
                <h3 class="text-cyan-500 font-bold uppercase text-sm italic">Янги ҳисобот юбориш</h3>
                <input type="text" placeholder="Мавзу..." class="w-full bg-black border border-gray-800 p-4 text-white text-xs outline-none focus:border-cyan-500">
                <textarea class="w-full bg-black border border-gray-800 p-4 h-64 text-white text-xs outline-none focus:border-cyan-500" placeholder="Батафсил маълумот..."></textarea>
                <button onclick="alert('Ҳисобот шифрланди ва юборилди!')" class="bg-cyan-600 text-black px-12 py-4 text-[10px] font-bold uppercase hover:bg-cyan-400 transition">Нашр қилиш</button>
            </div>
        </div>
    </div>

    <script>
        // Логин ойнасини бошқариш
        function openLogin() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }

        // Ролга қараб майдонларни ўзгартириш
        function updateLoginFields() {
            const role = document.getElementById('user-role').value;
            document.getElementById('phone-container').classList.toggle('hidden', role !== 'active');
            document.getElementById('pass-container').classList.toggle('hidden', role !== 'boss');
        }

        // Киришни текшириш
        function handleLoginAttempt() {
            const role = document.getElementById('user-role').value;
            const phone = document.getElementById('user-phone').value;
            const pass = document.getElementById('user-pass').value;

            if (role === 'boss' && pass === '1965') {
                enterDashboard('РАҲБАР (BOSS)');
            } else if (role === 'active' && phone.length >= 7) {
                enterDashboard('ФАОЛ АГЕНТ: ' + phone);
            } else {
                alert('КИРИШ РАД ЭТИЛДИ: Маълумотлар хато ёки майдон бўш!');
            }
        }

        // Кабинетга кириш
        function enterDashboard(user) {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('site-main').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('display-user').innerText = user;
        }

        // Табларни алмаштириш
        function switchTab(tab) {
            document.getElementById('tab-video').classList.add('hidden');
            document.getElementById('tab-post').classList.add('hidden');
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        // Камерани ишга тушириш
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.autoplay = true;
                videoElement.muted = true;
                const wrapper = document.getElementById('video-wrapper');
                wrapper.innerHTML = '';
                wrapper.appendChild(videoElement);
            } catch (err) {
                alert('Камерага рухсат берилмади!');
            }
        }

        // Соат
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString();
        }, 1000);
    </script>
</body>
</html>
