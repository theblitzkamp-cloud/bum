<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSAL MEDIA | SECURE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050a10; color: #c1c7cd; font-family: 'JetBrains Mono', monospace; }
        .spy-panel { background: rgba(10, 20, 30, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 207, 236, 0.2); }
        .video-box { aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; border: 1px solid #1a2a3a; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }
        .u-card { background: #0d1117; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; }
        .u-card:hover { border-color: #00cfec; }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="spy-panel sticky top-0 z-50 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-cyan-600 rounded flex items-center justify-center font-bold text-black shadow-[0_0_15px_rgba(0,207,236,0.5)]">U</div>
            <span class="text-xl font-black text-white">UNIVERSAL MEDIA</span>
        </div>
        <div class="flex space-x-6 text-[11px] font-bold uppercase">
            <button onclick="showPage('news')" class="hover:text-cyan-400">Янгиликлар</button>
            <button onclick="showPage('docs')" class="hover:text-cyan-400">Қонунлар</button>
            <button onclick="openLogin()" class="bg-cyan-600 text-black px-4 py-1 rounded">Шахсий кабинет</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div id="main-site" class="max-w-7xl mx-auto p-6 grid grid-cols-12 gap-8">
        <main class="col-span-12 md:col-span-9" id="post-container">
            <!-- Мақолалар базадан шу ерга чиқади -->
        </main>
        <aside class="col-span-12 md:col-span-3">
            <div class="spy-panel p-4">
                <h3 class="text-cyan-500 text-[10px] uppercase mb-4">Архив</h3>
                <div id="sidebar-links" class="text-[11px] space-y-2"></div>
            </div>
        </aside>
    </div>

    <!-- LOGIN -->
    <div id="login-modal" class="fixed inset-0 bg-black/98 hidden items-center justify-center z-[1000]">
        <div class="spy-panel p-8 w-full max-w-md border-t-4 border-cyan-500">
            <h2 class="text-center text-white mb-6 text-sm font-bold">IDENTIFICATION</h2>
            <select id="role" class="w-full bg-black border border-gray-800 p-3 text-cyan-500 mb-4 outline-none" onchange="toggleInp()">
                <option value="active">ФАОЛ (ТЕЛЕФОН)</option>
                <option value="admin">АДМИН</option>
                <option value="boss">РАҲБАР (BOSS)</option>
            </select>
            <input type="text" id="l-id" class="w-full bg-black border border-gray-800 p-3 text-white mb-4 outline-none" placeholder="901234567">
            <input type="password" id="l-pass" class="w-full bg-black border border-gray-800 p-3 text-white mb-4 outline-none hidden" placeholder="Пароль">
            <button onclick="login()" class="w-full bg-cyan-600 text-black py-3 font-bold uppercase text-xs">Кириш</button>
            <button onclick="closeLogin()" class="w-full text-gray-600 text-[10px] mt-4 uppercase">Ёпиш</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="fixed inset-0 bg-[#020508] hidden z-[2000] flex">
        <div class="w-64 border-r border-gray-900 p-6 flex flex-col justify-between">
            <nav class="space-y-6 text-[10px] font-bold uppercase">
                <button onclick="switchTab('vchat')" class="block hover:text-cyan-400"><i class="fas fa-video mr-2"></i> Видеочат</button>
                <button onclick="switchTab('write')" class="block hover:text-cyan-400"><i class="fas fa-edit mr-2"></i> Нашр қилиш</button>
                <button onclick="switchTab('reports')" class="block hover:text-cyan-400"><i class="fas fa-file mr-2"></i> Ҳисоботлар</button>
            </nav>
            <button onclick="location.reload()" class="text-red-600 text-[10px] font-bold">ЧИҚИШ</button>
        </div>
        <div class="flex-1 p-8 overflow-y-auto">
            <div id="tab-vchat" class="space-y-6">
                <div class="video-box" id="v-box">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-800"><i class="fas fa-camera text-6xl"></i></div>
                </div>
                <div class="flex space-x-4">
                    <button onclick="startCam()" class="bg-cyan-700 text-black px-6 py-2 text-[10px] font-bold">КАМЕРА</button>
                    <button id="rec-btn" onclick="toggleRec()" class="bg-gray-800 text-white px-6 py-2 text-[10px] font-bold">ЗАПИС</button>
                </div>
            </div>
            
            <div id="tab-write" class="hidden space-y-4 max-w-2xl">
                <input id="p-title" type="text" placeholder="Сарлавҳа" class="w-full bg-black border border-gray-800 p-3 text-white">
                <textarea id="p-body" class="w-full bg-black border border-gray-800 p-3 text-white h-40" placeholder="Матн (4 тилга таржима қилинади)"></textarea>
                <button onclick="publishPost()" class="bg-cyan-600 text-black px-8 py-3 text-[10px] font-bold uppercase">Таржима ва Нашр</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBnDKaFZClF1SS9al1pEyG5iUWCgnRcvBI",
            authDomain: "bumuzbekistan.firebaseapp.com",
            databaseURL: "https://bumuzbekistan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bumuzbekistan",
            storageBucket: "bumuzbekistan.firebasestorage.app",
            messagingSenderId: "197153596410",
            appId: "1:197153596410:web:db18dca78e911a213e3a43"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // AUTH
        function toggleInp() {
            const isAcc = document.getElementById('role').value === 'active';
            document.getElementById('l-pass').classList.toggle('hidden', isAcc);
        }

        function login() {
            const role = document.getElementById('role').value;
            const id = document.getElementById('l-id').value;
            const pass = document.getElementById('l-pass').value;

            if(role === 'boss' && id === 'boss' && pass === '1965') {
                showDash('DIRECTOR');
            } else if(id.length >= 7) {
                showDash('AGENT: ' + id);
                sendGeo(id); // Геолокация юбориш
            } else { alert("Хато!"); }
        }

        function showDash(user) {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function switchTab(t) {
            ['vchat','write','reports'].forEach(id => document.getElementById('tab-'+id)?.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
        }

        // POSTS
        function publishPost() {
            const t = document.getElementById('p-title').value;
            const b = document.getElementById('p-body').value;
            db.ref('posts').push({
                title: t,
                body: b,
                date: new Date().toISOString(),
                author: "V. Kachanov"
            });
            alert("Нашр қилинди!");
            location.reload();
        }

        // LOAD POSTS
        db.ref('posts').on('value', snap => {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                container.innerHTML += `
                    <div class="u-card p-4 mb-6">
                        <h3 class="text-cyan-400 font-bold mb-2 uppercase">${data.title}</h3>
                        <p class="text-xs leading-relaxed opacity-80">${data.body}</p>
                        <div class="mt-4 text-[9px] text-gray-600 italic">Сана: ${new Date(data.date).toLocaleString()}</div>
                    </div>
                `;
            });
        });

        // CAMERA & REC
        let stream, recorder, chunks = [];
        async function startCam() {
            stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            const v = document.createElement('video');
            v.srcObject = stream; v.autoplay = true; v.muted = true;
            const box = document.getElementById('v-box');
            box.innerHTML = ''; box.appendChild(v);
        }

        function toggleRec() {
            if(!recorder || recorder.state === 'inactive') {
                chunks = [];
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, {type:'video/webm'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'report.webm'; a.click();
                };
                recorder.start();
                document.getElementById('rec-btn').innerText = "ТЎХТАТИШ";
                document.getElementById('rec-btn').style.background = "red";
            } else {
                recorder.stop();
                document.getElementById('rec-btn').innerText = "ЗАПИС";
                document.getElementById('rec-btn').style.background = "#1f2937";
            }
        }

        function sendGeo(id) {
            navigator.geolocation.getCurrentPosition(pos => {
                db.ref('agents/' + id).update({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    lastSeen: new Date().toISOString()
                });
            });
        }

        function openLogin() { document.getElementById('login-modal').classList.remove('hidden'); document.getElementById('login-modal').classList.add('flex'); }
        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }
        function showPage(p) { alert(p.toUpperCase() + " бўлими юкланмоқда..."); }
    </script>
</body>
</html>
