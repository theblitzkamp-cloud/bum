<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>BUM HQ | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] h-screen flex items-center justify-center">
    <div class="bg-[#0d1117] p-8 rounded-2xl border border-gray-800 w-80 text-center shadow-2xl">
        <h2 class="text-white text-xl font-black mb-6 uppercase">BUM SYSTEM</h2>
        
        <input type="password" id="l" placeholder="Логин" class="w-full p-3 mb-3 bg-black border border-gray-800 rounded-lg text-blue-500 text-center outline-none">
        <input type="password" id="p" placeholder="Пароль" class="w-full p-3 mb-6 bg-black border border-gray-800 rounded-lg text-blue-500 text-center outline-none">
        
        <button onclick="go()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">КИРИШ</button>
    </div>

    <script>
        function go() {
            const l = document.getElementById('l').value;
            const p = document.getElementById('p').value;
            if(l === "bum" && p === "2026") {
                window.location.replace("dashboard.html");
            } else {
                alert("Хато!");
            }
        }
    </script>
</body>
</html>
