<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYSTEM V7 | UNIVERSAL MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="https://8x8.vc/vpaas-magic-cookie-887e583c784a4b08b31a56f08149f13e/external_api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020508; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .glass { background: rgba(10, 20, 30, 0.95); border: 1px solid rgba(0, 207, 236, 0.3); backdrop-filter: blur(10px); }
        
        /* Sidebar Responsive */
        #sidebar { transition: transform 0.3s ease; z-index: 1000; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); position: fixed; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
        }

        /* Editor Style */
        #editor { min-height: 250px; background: #000; border: 1px solid #1a2a3a; padding: 15px; outline: none; font-size: 14px; color: #e5e7eb; border-radius: 0 0 8px 8px; }
        .toolbar-btn { background: #111827; padding: 8px; border-radius: 4px; border: 1px solid #374151; color: #9ca3af; flex-shrink: 0; }
        
        /* Video Container */
        #meet-container { width: 100%; height: 60vh; border-radius: 12px; background: #000; overflow: hidden; border: 1px solid #1a2a3a; }
        
        .nav-btn { display: flex; align-items: center; width: 100%; padding: 12px; border-radius: 8px; transition: 0.2s; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .nav-btn:hover { background: rgba(0, 207, 236, 0.15); color: #00cfec; }
        .active-nav { background: rgba(0, 207, 236, 0.1); color: #00cfec; border-left: 3px solid #00cfec; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <!-- КИРИШ ОЙНАСИ (AUTH) -->
    <div id="auth" class="fixed inset-0 bg-black flex items-center justify-center z-[2000] p-4">
        <div class="glass p-8 w-full max-w-sm rounded-2xl shadow-2xl border-t-4 border-cyan-500">
            <div class="text-center mb-6">
                <div class="text-cyan-500 font-black text-2xl tracking-tighter">UNIVERSAL<span class="text-white">CORE</span></div>
                <p class="text-[9px] text-gray-500 uppercase mt-1 tracking-widest">Система хавфсизлик текшируви</p>
            </div>
            <select id="role" class="w-full bg-gray-900 border border-gray-800 p-3 mb-4 text-xs text-cyan-400 outline-none rounded-lg" onchange="toggleInputs()">
                <option value="active">ФАОЛ (AGENT)</option>
                <option value="admin">АДМИН (OPERATOR)</option>
                <option value="boss">РАҲБАР (DIRECTOR)</option>
            </select>
            <input type="text" id="login-val" class="w-full bg-gray-900 border border-gray-800 p-3 mb-4 text-xs text-white outline-none rounded-lg" placeholder="Логин ёки Тел">
            <div id="pass-box" class="hidden">
                <input type="password" id="pass-val" class="w-full bg-gray-900 border border-gray-800 p-3 mb-4 text-xs text-white outline-none rounded-lg" placeholder="Махфий код">
            </div>
            <button onclick="login()" class="w-full bg-cyan-600 text-black py-4 rounded-lg font-black text-xs uppercase hover:bg-cyan-400 transition transform active:scale-95">Тизимга кириш</button>
        </div>
    </div>

    <!-- МОБИЛ МЕНЮ ТУГМАСИ -->
    <div class="md:hidden bg-gray-950 p-4 flex justify-between items-center border-b border-gray-900 w-full">
        <div class="text-cyan-500 font-bold text-sm">UNIVERSAL MEDIA</div>
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="text-cyan-500 text-xl">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-72 bg-gray-950 p-6 border-r border-gray-900 flex flex-col justify-between overflow-y-auto shrink-0">
        <div class="space-y-8">
            <div class="hidden md:flex flex-col border-b border-cyan-900/30 pb-4">
                <span class="text-cyan-500 font-black text-xl italic tracking-tighter">CORE<span class="text-white">_V7</span></span>
                <span class="text-[8px] text-gray-600 uppercase mt-1">Encrypted Terminal</span>
            </div>
            
            <nav class="space-y-1">
                <a href="index.html" class="nav-btn text-yellow-500 border border-yellow-900/20 mb-4 bg-yellow-900/5">
                    <i class="fas fa-home mr-3 w-5"></i> Асосий саҳифа
                </a>
                
                <button onclick="showSec('v')" class="nav-btn active-nav"><i class="fas fa-video mr-3 w-5"></i> Видео алоқа</button>
                <button onclick="showSec('w')" class="nav-btn"><i class="fas fa-pen-nib mr-3 w-5"></i> Мақола ёзиш</button>
                <button onclick="showSec('f')" class="nav-btn"><i class="fas fa-file-shield mr-3 w-5"></i> Ҳисобот юбориш</button>
                
                <div id="admin-tools" class="hidden pt-6 mt-6 border-t border-gray-800 space-y-1">
                    <p class="text-gray-700 text-[9px] mb-2 font-bold px-3">БОШҚАРУВ</p>
                    <button onclick="showSec('u')" class="nav-btn text-green-500"><i class="fas fa-user-plus mr-3 w-5"></i> Фаол қўшиш</button>
                    <button onclick="showSec('m')" class="nav-btn text-orange-500"><i class="fas fa-database mr-3 w-5"></i> Маълумотлар</button>
                </div>
            </nav>
        </div>
        
        <button onclick="location.reload()" class="mt-10 text-red-600 text-[10px] font-black uppercase hover:text-white transition flex items-center p-3 border border-red-950/30 rounded-lg">
            <i class="fas fa-power-off mr-3"></i> Тизимни ёпиш
        </button>
    </aside>

    <!-- CONTENT AREA -->
    <main class="flex-1 overflow-y-auto bg-[#030712] p-4 md:p-10">
        <header class="flex justify-between items-center mb-8 border-b border-gray-900 pb-4">
            <div>
                <div id="user-display" class="text-cyan-500 text-[11px] font-black uppercase"></div>
                <div id="clock" class="text-[9px] text-gray-600 font-bold mt-1"></div>
            </div>
        </header>

        <!-- 1. VIDEO CHAT SECTION -->
        <div id="sec-v" class="space-y-4">
            <div id="meet-container" class="shadow-2xl shadow-cyan-900/10">
                <div class="flex flex-col items-center justify-center h-full text-gray-800 p-6 text-center">
                    <i class="fas fa-shield-halved text-4xl mb-4 opacity-20"></i>
                    <p class="text-[10px] uppercase font-bold tracking-widest">Алоқа линиясини фаоллаштиринг</p>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <button onclick="initMeeting()" class="bg-cyan-700 text-black py-4 rounded-xl text-[10px] font-black uppercase hover:bg-cyan-500">Алоқани бошлаш</button>
                <button id="start-rec" onclick="startRecording()" class="bg-orange-600 text-white py-4 rounded-xl text-[10px] font-black uppercase hover:bg-orange-500">Записни бошлаш</button>
                <button id="stop-rec" onclick="stopRecording()" class="hidden bg-gray-700 text-white py-4 rounded-xl text-[10px] font-black uppercase">Тўхтатиш</button>
            </div>
        </div>

        <!-- 2. ARTICLE EDITOR -->
        <div id="sec-w" class="hidden max-w-4xl mx-auto space-y-4">
            <div class="flex flex-col sm:flex-row justify-between gap-4">
                <input id="post-title" type="text" placeholder="Мақола сарлавҳаси" class="flex-1 bg-gray-900 border border-gray-800 p-4 text-xs text-white rounded-xl outline-none focus:border-cyan-500">
                <select id="post-category" class="bg-gray-900 border border-gray-800 p-4 text-[10px] text-cyan-400 font-bold rounded-xl outline-none">
                    <option value="news">ЯНГИЛИКЛАР БЎЛИМИ</option>
                    <option value="articles">МАҚОЛАЛАР БЎЛИМИ</option>
                    <option value="law">ҚОНУН ҲУЖЖАТЛАРИ</option>
                </select>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
                <div class="flex flex-wrap gap-2 p-3 bg-gray-950 border-b border-gray-800">
                    <button onclick="exec('bold')" class="toolbar-btn"><i class="fas fa-bold"></i></button>
                    <button onclick="exec('italic')" class="toolbar-btn"><i class="fas fa-italic"></i></button>
                    <button onclick="exec('fontSize', '5')" class="toolbar-btn">A+</button>
                    <button onclick="exec('foreColor', '#00cfec')" class="toolbar-btn"><i class="fas fa-palette"></i></button>
                    <button onclick="document.getElementById('img-file').click()" class="toolbar-btn"><i class="fas fa-image"></i> Расм</button>
                    <input type="file" id="img-file" class="hidden" accept="image/*" onchange="handleImage(this)">
                </div>
                <div id="editor" contenteditable="true"></div>
            </div>
            <button onclick="savePost()" class="w-full bg-cyan-600 text-black py-4 rounded-xl text-[10px] font-black uppercase hover:bg-cyan-400">Нашр қилиш</button>
        </div>

        <!-- 3. CONFIDENTIAL REPORTS -->
        <div id="sec-f" class="hidden max-w-xl mx-auto space-y-6">
            <div class="bg-red-950/10 border border-red-900/30 p-4 rounded-xl text-red-500 text-[10px] leading-relaxed">
                <i class="fas fa-lock mr-2"></i> Ушбу бўлим орқали юборилган файллар фақат Раҳбар томонидан кўрилади ва автоматик шифрланади.
            </div>
            <div class="border-2 border-dashed border-gray-800 p-12 text-center rounded-2xl hover:border-cyan-500 cursor-pointer bg-black/40" onclick="document.getElementById('secret-file').click()">
                <i class="fas fa-file-arrow-up text-4xl mb-4 text-gray-700"></i>
                <p id="file-name-display" class="text-[10px] text-cyan-500 font-bold"></p>
                <input type="file" id="secret-file" class="hidden" onchange="document.getElementById('file-name-display').innerText = this.files[0].name">
            </div>
            <button onclick="uploadSecretFile()" class="w-full bg-cyan-700 text-black py-4 rounded-xl text-[10px] font-black uppercase">Маълумотни узатиш</button>
        </div>

        <!-- 4. AGENT MANAGEMENT -->
        <div id="sec-u" class="hidden max-w-md mx-auto space-y-4">
            <div class="glass p-6 rounded-2xl space-y-4 border-green-900/20">
                <h3 class="text-green-500 text-[10px] font-black uppercase">Янги агентни рўйхатга олиш</h3>
                <input id="new-agent-name" type="text" placeholder="Исм Фамилия" class="w-full bg-black border border-gray-800 p-3 text-xs rounded-lg outline-none">
                <input id="new-agent-id" type="text" placeholder="ID / Тел рақам" class="w-full bg-black border border-gray-800 p-3 text-xs rounded-lg outline-none">
                <button onclick="addNewAgent()" class="w-full bg-green-700 text-black py-3 rounded-lg text-[10px] font-black uppercase">Базага киритиш</button>
            </div>
            <div id="agents-list" class="space-y-2"></div>
        </div>

        <!-- 5. DATABASE -->
        <div id="sec-m" class="hidden space-y-4">
            <div id="db-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyBnDKaFZClF1SS9al1pEyG5iUWCgnRcvBI",
            authDomain: "bumuzbekistan.firebaseapp.com",
            databaseURL: "https://bumuzbekistan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bumuzbekistan",
            storageBucket: "bumuzbekistan.firebasestorage.app",
            appId: "1:197153596410:web:db18dca78e911a213e3a43"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userU = ""; let userR = ""; let mediaRecorder; let recordedChunks = [];

        function toggleInputs() {
            const r = document.getElementById('role').value;
            document.getElementById('pass-box').classList.toggle('hidden', r == 'active');
        }

        function login() {
            const r = document.getElementById('role').value;
            const l = document.getElementById('login-val').value;
            const p = document.getElementById('pass-val').value;

            if(r == 'boss' && p == '1965') { userU = "DIRECTOR: N.ZOKIROV"; userR = 'boss'; }
            else if(r == 'admin' && p == '123') { userU = "OPERATOR: ADMIN"; userR = 'admin'; }
            else if(r == 'active' && l.length > 3) { userU = "AGENT: " + l; userR = 'agent'; }
            else return alert("КИРИШ ТАҚИҚЛАНДИ!");

            document.getElementById('auth').classList.add('hidden');
            document.getElementById('user-display').innerText = userU;
            if(userR == 'boss' || userR == 'admin') {
                document.getElementById('admin-tools').classList.remove('hidden');
                loadManagement(); loadAgents();
            }
        }

        // --- MULTI-USER VIDEO CHAT ---
        function initMeeting() {
            const domain = "meet.jit.si";
            const options = {
                roomName: "UniversalMedia_Secure_Line_2026",
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#meet-container'),
                userInfo: { displayName: userU },
                configOverwrite: { startWithAudioMuted: true },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'chat', 'tileview', 'fullscreen'],
                    MOBILE_APP_PROMO: false
                }
            };
            document.getElementById('meet-container').innerHTML = "";
            new JitsiMeetExternalAPI(domain, options);
        }

        // --- SCREEN RECORDING SYSTEM ---
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: "video/webm" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = `Meeting_Record_${new Date().getTime()}.webm`;
                    a.click();
                    recordedChunks = [];
                };
                mediaRecorder.start();
                document.getElementById('start-rec').classList.add('hidden');
                document.getElementById('stop-rec').classList.remove('hidden');
            } catch (err) { alert("Записни бошлаш учун экранни танланг!"); }
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('start-rec').classList.remove('hidden');
            document.getElementById('stop-rec').classList.add('hidden');
        }

        // --- EDITOR FUNCTIONS ---
        function exec(cmd, val = null) { document.execCommand(cmd, false, val); }
        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = `<img src="${e.target.result}" class="max-w-full rounded-lg my-4 border border-gray-800 shadow-xl">`;
                document.getElementById('editor').focus();
                document.execCommand('insertHTML', false, img);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function savePost() {
            const title = document.getElementById('post-title').value;
            const cat = document.getElementById('post-category').value;
            const body = document.getElementById('editor').innerHTML;
            if(!title || body.length < 20) return alert("Мазмун тўлиқ эмас!");
            db.ref('posts').push({ title, category: cat, body, author: userU, date: new Date().toISOString() })
              .then(() => { alert("Муваффақиятли нашр этилди!"); location.reload(); });
        }

        // --- DATA MANAGEMENT ---
        function showSec(s) {
            ['v','w','f','u','m'].forEach(x => {
                document.getElementById('sec-'+x).classList.add('hidden');
                const btn = document.querySelector(`[onclick="showSec('${x}')"]`);
                if(btn) btn.classList.remove('active-nav');
            });
            document.getElementById('sec-'+s).classList.remove('hidden');
            const activeBtn = document.querySelector(`[onclick="showSec('${s}')"]`);
            if(activeBtn) activeBtn.classList.add('active-nav');
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        }

        function addNewAgent() {
            const n = document.getElementById('new-agent-name').value;
            const i = document.getElementById('new-agent-id').value;
            if(n && i) db.ref('agents').push({ name: n, login: i, by: userU }).then(() => { alert("Агент қўшилди"); });
        }

        function loadAgents() {
            db.ref('agents').on('value', snap => {
                const l = document.getElementById('agents-list'); l.innerHTML = '';
                snap.forEach(c => l.innerHTML += `<div class="bg-gray-900 border border-gray-800 p-3 rounded-xl flex justify-between items-center text-[10px]"><span>${c.val().name} (ID: ${c.val().login})</span><button onclick="db.ref('agents').child('${c.key}').remove()" class="text-red-500"><i class="fas fa-trash"></i></button></div>`);
            });
        }

        function loadManagement() {
            db.ref('posts').on('value', snap => {
                const c = document.getElementById('db-content'); c.innerHTML = '';
                snap.forEach(i => c.innerHTML += `<div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl flex justify-between items-center"><div class="text-[10px] font-bold"><span class="text-cyan-500 mr-2">[${i.val().category}]</span>${i.val().title}</div><button onclick="db.ref('posts').child('${i.key}').remove()" class="text-red-500 border border-red-900 px-3 py-1 rounded-lg text-[9px]">Ўчириш</button></div>`);
            });
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('uz-UZ', {weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);
    </script>
</body>
</html>
